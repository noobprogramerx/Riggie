<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riggie Sealion Voice - リギーの声と表情</title>
  <meta name="description" content="アシカのリギー（Riggie Sealion）の吠える声とシーっとする顔を再生できるインタラクティブアプリです。連続吠え機能搭載。">
  <link rel="stylesheet" href="style.css">
  <!-- Babel Standalone CDN -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div class="app-container">
    <div class="main-card">
      <!-- エラー表示バルーン -->
      <div id="error-display" class="error-display"></div>

      <!-- スケルトン/ローディングインジケーター -->
      <div id="loading-indicator" class="loading-indicator">
        <div class="spinner"></div>
        <p>リギーを準備中...</p>
      </div>

      <h1>Riggie Sealion</h1>
      <p class="subtitle">〜吠える声とシーっとする顔〜</p>

      <!-- アシカ画像表示エリア -->
      <div id="sealion-viewer-root"></div>

      <!-- コントロールボタンエリア -->
      <div id="control-panel-root"></div>
    </div>
  </div>

  <!-- INLINE_SCRIPTS_PLACEHOLDER -->
</body>
</html>
